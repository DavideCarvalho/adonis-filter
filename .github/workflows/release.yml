name: Release

# Manual trigger: run from the Actions tab (or `gh workflow run release.yml`).
# - With pending changesets, opens/updates a "version packages" PR.
# - With none, publishes any package whose version isn't on npm yet.
on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Lets the job mint an OIDC token for npm trusted publishing, so a release needs no
  # long-lived NPM_TOKEN. changesets/action probes for this; without it the run logs
  # "No NPM_TOKEN or OIDC available" and never attempts OIDC at all.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing needs npm CLI >= 11.5.1; Node 22 still bundles npm 10.x.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
